
<style>
#viewer { padding: 1rem 0; }
#controls { display: flex; gap: 12px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
#info { font-family: var(--font-mono); font-size: 13px; color: var(--color-text-secondary); background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 8px 12px; min-height: 36px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
#canvas-wrap { overflow: auto; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); cursor: crosshair; display: inline-block; }
canvas { display: block; image-rendering: pixelated; }
#selected-list { margin-top: 1rem; font-family: var(--font-mono); font-size: 12px; color: var(--color-text-primary); }
#selected-list table { border-collapse: collapse; width: 100%; }
#selected-list td, #selected-list th { padding: 4px 8px; border: 0.5px solid var(--color-border-tertiary); text-align: left; font-size: 12px; }
#selected-list th { color: var(--color-text-secondary); font-weight: 500; }
label { font-size: 13px; color: var(--color-text-secondary); }
</style>
<div id="viewer">
  <div id="controls">
    <label>Завантажити тайлсет (PNG):</label>
    <input type="file" accept="image/png,image/jpeg" id="fileInput" />
    <label>Zoom:</label>
    <input type="range" min="1" max="4" value="2" step="1" id="zoom" style="width:80px" />
    <span id="zoom-out" style="font-size:13px;color:var(--color-text-secondary)">2x</span>
    <button onclick="clearSelected()" style="font-size:12px;padding:4px 10px">Очистити</button>
    <button onclick="copyResults()" style="font-size:12px;padding:4px 10px">Копіювати ↗</button>
  </div>
  <div id="info">Завантажте PNG тайлсету щоб почати</div>
  <div id="canvas-wrap"><canvas id="c"></canvas></div>
  <div id="selected-list"></div>
</div>
<script>
const TILE = 16, SPACING = 1, STEP = TILE + SPACING;
let img = null, zoom = 2, cols = 0, rows = 0;
let selected = [];
let hoverCol = -1, hoverRow = -1;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');

document.getElementById('zoom').oninput = e => {
  zoom = +e.target.value;
  document.getElementById('zoom-out').textContent = zoom + 'x';
  if (img) draw();
};

document.getElementById('fileInput').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const url = URL.createObjectURL(f);
  const image = new Image();
  image.onload = () => {
    img = image;
    cols = Math.floor((img.width + SPACING) / STEP);
    rows = Math.floor((img.height + SPACING) / STEP);
    draw();
  };
  image.src = url;
};

canvas.onmousemove = e => {
  if (!img) return;
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) / zoom;
  const my = (e.clientY - r.top) / zoom;
  hoverCol = Math.floor(mx / STEP);
  hoverRow = Math.floor(my / STEP);
  info.innerHTML = `col: <b>${hoverCol}</b> &nbsp; row: <b>${hoverRow}</b> &nbsp; x: <b>${hoverCol*STEP}</b> &nbsp; y: <b>${hoverRow*STEP}</b>`;
  draw();
};

canvas.onclick = e => {
  if (!img) return;
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) / zoom;
  const my = (e.clientY - r.top) / zoom;
  const col = Math.floor(mx / STEP);
  const row = Math.floor(my / STEP);
  const existing = selected.findIndex(s => s.col===col && s.row===row);
  if (existing >= 0) { selected.splice(existing,1); }
  else { selected.push({col, row, label:''}); }
  renderList();
  draw();
};

function draw() {
  if (!img) return;
  canvas.width = img.width * zoom;
  canvas.height = img.height * zoom;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, 0, 0, img.width*zoom, img.height*zoom);
  ctx.strokeStyle = 'rgba(255,255,0,0.5)';
  ctx.lineWidth = 1;
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
    ctx.strokeRect(c*STEP*zoom, r*STEP*zoom, TILE*zoom, TILE*zoom);
  }
  if (hoverCol>=0 && hoverRow>=0) {
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(hoverCol*STEP*zoom, hoverRow*STEP*zoom, TILE*zoom, TILE*zoom);
  }
  selected.forEach(s => {
    ctx.fillStyle = 'rgba(0,200,255,0.35)';
    ctx.fillRect(s.col*STEP*zoom, s.row*STEP*zoom, TILE*zoom, TILE*zoom);
    ctx.strokeStyle = '#00ccff';
    ctx.lineWidth = 2;
    ctx.strokeRect(s.col*STEP*zoom, s.row*STEP*zoom, TILE*zoom, TILE*zoom);
    ctx.lineWidth = 1;
  });
}

function renderList() {
  const div = document.getElementById('selected-list');
  if (!selected.length) { div.innerHTML=''; return; }
  let html = '<table><tr><th>Назва об\'єкту</th><th>col</th><th>row</th><th>x</th><th>y</th><th></th></tr>';
  selected.forEach((s,i) => {
    html += `<tr>
      <td><input value="${s.label}" placeholder="напр. Player" style="font-size:12px;padding:2px 6px;width:120px" onchange="selected[${i}].label=this.value" /></td>
      <td>${s.col}</td><td>${s.row}</td>
      <td>${s.col*STEP}</td><td>${s.row*STEP}</td>
      <td><button onclick="selected.splice(${i},1);renderList();draw()" style="font-size:11px;padding:2px 6px">x</button></td>
    </tr>`;
  });
  html += '</table>';
  div.innerHTML = html;
}

function clearSelected() { selected=[]; renderList(); draw(); }

function copyResults() {
  if (!selected.length) { alert('Нічого не вибрано'); return; }
  const lines = selected.map(s => `${s.label||'?'}: col=${s.col}, row=${s.row}, x=${s.col*STEP}, y=${s.row*STEP}`);
  navigator.clipboard.writeText(lines.join('\n'));
  alert('Скопійовано!');
}
</script>
